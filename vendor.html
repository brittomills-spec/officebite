    let db;

    async function init() {
      const app = firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').textContent = today;

      // Real-time listener
      db.collection("dailyCounts").doc(today)
        .onSnapshot(doc => {
          const data = doc.data();
          document.getElementById('count').textContent = data ? data.count || 0 : 0;
        });
    }

    window.onload = init;
  </script>
