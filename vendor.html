<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeBite - Vendor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div class="max-w-md mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-1">🍱 OfficeBite</h1>
    <p class="text-emerald-400 text-center mb-8">Vendor Dashboard</p>
    
    <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-10 text-center">
      <p class="text-emerald-400 text-sm tracking-widest mb-2">BREAKFAST COLLECTED TODAY</p>
      <div id="count" class="text-8xl font-bold text-white mb-3">0</div>
      <p id="date" class="text-gray-400 text-lg mb-1"></p>
      <p id="time" class="text-gray-500 text-sm"></p>
    </div>

    <p class="text-center text-xs text-gray-500 mt-12">Real-time • Auto updates</p>
  </div>

  <script>
const firebaseConfig = {
  apiKey: "AIzaSyDdxUmiVKz1HrWXskW50VdfAo-O8VvG63I",
  authDomain: "officebite-2026.firebaseapp.com",
  projectId: "officebite-2026",
  storageBucket: "officebite-2026.firebasestorage.app",
  messagingSenderId: "221687690326",
  appId: "1:221687690326:web:6e164899382ada305177f7",
  measurementId: "G-75LVRGSW2C"
};

    let db;

    function getISTDateTime() {
      const now = new Date();
      const istOffset = 330;
      const localOffset = now.getTimezoneOffset();
      const istTime = new Date(now.getTime() + (istOffset + localOffset) * 60000);
      
      const dateStr = istTime.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const timeStr = istTime.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      
      return { dateStr, timeStr, today: istTime.toISOString().split('T')[0] };
    }

    async function initVendor() {
      if (!firebaseConfig.apiKey) {
        alert("Firebase config missing in vendor.html");
        return;
      }

      const app = firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();

      const { dateStr, timeStr, today } = getISTDateTime();
      document.getElementById('date').textContent = dateStr;
      document.getElementById('time').textContent = timeStr + " IST";

      // Real-time listener
      const countRef = db.collection("dailyCounts").doc(today);
      
      countRef.onSnapshot((doc) => {
        const data = doc.data();
        document.getElementById('count').textContent = data ? (data.count || 0) : 0;
      });

      // Create document if not exists
      countRef.get().then(doc => {
        if (!doc.exists) countRef.set({ count: 0 });
      });
    }

    window.onload = initVendor;
  </script>
</body>
</html>
