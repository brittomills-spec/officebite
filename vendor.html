<body class="bg-gray-900 text-white min-h-screen">
  <div class="max-w-md mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🍱 OfficeBite</h1>
    <p class="text-emerald-400 text-center mb-8">Vendor Dashboard</p>
    
    <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-10 text-center shadow-2xl">
      <p class="text-emerald-400 text-sm tracking-widest mb-1">BREAKFAST COLLECTED TODAY</p>
      <div id="count" class="text-8xl font-bold text-white mb-2">0</div>
      <p id="date" class="text-gray-400 text-lg"></p>
    </div>

    <p class="text-center text-xs text-gray-500 mt-12">Real-time updates • Pull down to refresh</p>
  </div>

  <script>
    // 🔥🔥🔥 PASTE YOUR EXACT FIREBASE CONFIG HERE (same as in index.html)
    const firebaseConfig = {
    const firebaseConfig = {
    apiKey: "AIzaSyDdxUmiVKz1HrWXskW50VdfAo-O8VvG63I",
    authDomain: "officebite-2026.firebaseapp.com",
    projectId: "officebite-2026",
    storageBucket: "officebite-2026.firebasestorage.app",
    messagingSenderId: "221687690326",
    appId: "1:221687690326:web:6e164899382ada305177f7",
    measurementId: "G-75LVRGSW2C"
    };
    };

    let db;

    async function initVendor() {
      if (!firebaseConfig.apiKey) {
        alert("Firebase config missing in vendor.html!");
        return;
      }

      const app = firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').textContent = today;

      // Real-time listener
      const countRef = db.collection("dailyCounts").doc(today);
      
      countRef.onSnapshot((doc) => {
        const data = doc.data();
        const currentCount = data && data.count ? data.count : 0;
        document.getElementById('count').textContent = currentCount;
        console.log(`✅ Count updated to: ${currentCount}`);
      }, (error) => {
        console.error("Listener error:", error);
        alert("Error listening to updates. Check Firebase rules.");
      });

      // Create the document with 0 if it doesn't exist (helps with first increment)
      countRef.get().then(doc => {
        if (!doc.exists) {
          countRef.set({ count: 0 });
        }
      });
    }

    window.onload = initVendor;
  </script>
