<body class="bg-gradient-to-br from-blue-50 to-emerald-50 min-h-screen">
  <div class="max-w-md mx-auto p-6">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-emerald-600">🍱 OfficeBite</h1>
      <p class="text-gray-600 mt-1">Scan & Collect Breakfast</p>
    </div>

    <div id="scanner-screen" class="space-y-6">
      <div class="bg-white rounded-3xl shadow-xl p-6">
        <button onclick="startScanner()" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-5 rounded-2xl text-xl flex items-center justify-center gap-3">
          📸 Scan QR to Collect
        </button>
        <p class="text-center text-xs text-gray-500 mt-4">Point camera at the QR code at the food counter</p>
      </div>
    </div>

    <div id="result-screen" class="hidden bg-white rounded-3xl shadow-xl p-8 text-center">
      <div id="coupon" class="border-2 border-dashed border-emerald-400 rounded-2xl p-8 mb-6"></div>
      <button onclick="resetApp()" 
              class="text-emerald-600 font-medium">Done ✓</button>
    </div>

    <div id="already-screen" class="hidden bg-white rounded-3xl shadow-xl p-8 text-center">
      <div class="text-6xl mb-4">🙅‍♂️</div>
      <h2 class="text-2xl font-semibold text-gray-800">Already Collected Today</h2>
      <p class="text-gray-600 mt-2">You can collect again tomorrow. Thanks!</p>
      <button onclick="resetApp()" class="mt-8 text-emerald-600 font-medium">Back</button>
    </div>
  </div>

  authDomain: "officebite-2026.firebaseapp.com",

    let app, auth, db;
    let currentUser = null;
    let html5QrCode;

    async function initFirebase() {
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      // Anonymous sign-in
      const user = await auth.signInAnonymously();
      currentUser = user.user;
      console.log("✅ Anonymous user ready:", currentUser.uid);
    }

    function startScanner() {
      document.getElementById('scanner-screen').classList.add('hidden');
      
      const reader = document.createElement('div');
      reader.id = 'reader';
      document.querySelector('.max-w-md').appendChild(reader);

      html5QrCode = new Html5Qrcode("reader");
      
      html5QrCode.start(
        { facingMode: "environment" }, // rear camera
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          // Scan successful → try to collect
          html5QrCode.stop().then(() => collectFood());
        }
      ).catch(err => alert("Camera error: " + err));
    }

    async function collectFood() {
      if (!currentUser) return alert("Please wait...");

      const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

      // Check if already collected today
      const userRef = db.collection("users").doc(currentUser.uid);
      const doc = await userRef.get();

      if (doc.exists && doc.data().lastCollection === today) {
        document.getElementById('already-screen').classList.remove('hidden');
        return;
      }

      // Record collection
      await userRef.set({ lastCollection: today }, { merge: true });

      // Increment today's count
      const countRef = db.collection("dailyCounts").doc(today);
      await countRef.set({ count: firebase.firestore.FieldValue.increment(1) }, { merge: true });

      // Show coupon
      showCoupon(today);
    }

    function showCoupon(today) {
      const couponHTML = `
        <div class="text-center">
          <div class="text-5xl mb-4">🎟️</div>
          <h2 class="text-3xl font-bold text-emerald-700">Breakfast Coupon</h2>
          <p class="text-xl mt-6 text-gray-700">Date: <strong>${today}</strong></p>
          <p class="mt-8 text-2xl font-semibold text-emerald-600">✅ Collected Successfully!</p>
          <div class="mt-10 text-xs text-gray-400">Show this screen to the vendor</div>
        </div>`;
      
      document.getElementById('coupon').innerHTML = couponHTML;
      document.getElementById('result-screen').classList.remove('hidden');
    }

    function resetApp() {
      location.reload();
    }

    // Initialize
    window.onload = () => {
      initFirebase();
    };
  </script>
</body>
</html>
