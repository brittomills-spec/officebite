<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeBite - Breakfast</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-blue-50 min-h-screen">
  <div class="max-w-md mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-600">🍱 OfficeBite</h1>
      <p class="text-gray-600 mt-2">Breakfast Collection</p>
    </div>

    <div id="home-screen" class="bg-white rounded-3xl shadow-xl p-8 text-center">
      <div id="datetime" class="text-lg font-medium text-gray-700 mb-8"></div>
      
      <div id="status" class="mb-8"></div>

      <button onclick="collectBreakfast()" 
              id="collect-btn"
              class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-400 text-white font-semibold py-6 rounded-2xl text-2xl transition">
        Collect Today's Breakfast
      </button>
    </div>

    <div id="coupon-screen" class="hidden bg-white rounded-3xl shadow-xl p-8 text-center">
      <div id="coupon" class="border-2 border-dashed border-emerald-400 rounded-2xl p-10"></div>
      <button onclick="resetApp()" 
              class="mt-8 text-emerald-600 font-medium text-lg">Done ✓</button>
    </div>

    <div id="already-screen" class="hidden bg-white rounded-3xl shadow-xl p-8 text-center">
      <div class="text-6xl mb-4">🙅‍♂️</div>
      <h2 class="text-2xl font-semibold text-gray-800">Already Collected Today</h2>
      <p class="text-gray-600 mt-3">You can collect breakfast again tomorrow.</p>
      <button onclick="resetApp()" class="mt-8 text-emerald-600 font-medium text-lg">Back</button>
    </div>
  </div>

  <script>
    // 🔥 PASTE YOUR FIREBASE CONFIG HERE (same as before)
const firebaseConfig = {
  apiKey: "AIzaSyDdxUmiVKz1HrWXskW50VdfAo-O8VvG63I",
  authDomain: "officebite-2026.firebaseapp.com",
  projectId: "officebite-2026",
  storageBucket: "officebite-2026.firebasestorage.app",
  messagingSenderId: "221687690326",
  appId: "1:221687690326:web:6e164899382ada305177f7",
  measurementId: "G-75LVRGSW2C"
};

    let app, auth, db;
    let currentUser = null;

    // Get current IST time
    function getISTDateTime() {
      const now = new Date();
      const istOffset = 330; // IST is UTC+5:30 in minutes
      const localOffset = now.getTimezoneOffset();
      const istTime = new Date(now.getTime() + (istOffset + localOffset) * 60000);
      
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = istTime.toLocaleDateString('en-IN', options);
      const timeStr = istTime.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      
      return { dateStr, timeStr, fullDate: istTime };
    }

    function updateDateTime() {
      const { dateStr, timeStr } = getISTDateTime();
      document.getElementById('datetime').innerHTML = `
        <div>${dateStr}</div>
        <div class="text-2xl font-semibold text-emerald-700">${timeStr} IST</div>
      `;
    }

    async function initFirebase() {
      if (!firebaseConfig.apiKey) {
        alert("Firebase config is missing!");
        return;
      }
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      const userCred = await auth.signInAnonymously();
      currentUser = userCred.user;
      console.log("✅ Anonymous user:", currentUser.uid);
    }

    async function collectBreakfast() {
      if (!currentUser) {
        alert("Please wait a moment...");
        return;
      }

      const now = getISTDateTime().fullDate;
      const today = now.toISOString().split('T')[0]; // YYYY-MM-DD
      const currentHour = now.getHours();

      // Cut-off time: 11 AM IST
      if (currentHour >= 13) {
        alert("Breakfast collection is closed after 11:00 AM.");
        return;
      }

      try {
        const userRef = db.collection("users").doc(currentUser.uid);
        const doc = await userRef.get();

        if (doc.exists && doc.data().lastCollection === today) {
          document.getElementById('home-screen').classList.add('hidden');
          document.getElementById('already-screen').classList.remove('hidden');
          return;
        }

        // Record collection
        await userRef.set({ lastCollection: today }, { merge: true });

        // Increment daily count
        const countRef = db.collection("dailyCounts").doc(today);
        await countRef.set({ count: firebase.firestore.FieldValue.increment(1) }, { merge: true });

        showCoupon(today);
      } catch (e) {
        console.error(e);
        alert("Error collecting breakfast. Please try again.");
      }
    }

    function showCoupon(today) {
      document.getElementById('home-screen').classList.add('hidden');
      const couponHTML = `
        <div class="text-center">
          <div class="text-6xl mb-6">🎟️</div>
          <h2 class="text-3xl font-bold text-emerald-700">Breakfast Collected</h2>
          <p class="text-xl mt-6 text-gray-700">Date: <strong>${today}</strong></p>
          <div class="mt-10 py-6 bg-emerald-100 rounded-2xl text-emerald-700 font-semibold text-2xl">
            ✅ Successfully Collected!
          </div>
          <p class="text-sm text-gray-500 mt-8">Please show this to the vendor</p>
        </div>`;
      
      document.getElementById('coupon').innerHTML = couponHTML;
      document.getElementById('coupon-screen').classList.remove('hidden');
    }

    function resetApp() {
      location.reload();
    }

    // Initialize
    window.onload = () => {
      updateDateTime();
      setInterval(updateDateTime, 30000); // update time every 30 seconds
      initFirebase();
    };
  </script>
</body>
</html>
