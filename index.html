<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeBite - Breakfast</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .coupon {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-blue-50 min-h-screen">
  <div class="max-w-md mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-600">🍱 OfficeBite</h1>
      <p class="text-gray-600 mt-2">Breakfast Collection</p>
    </div>

    <div id="home-screen" class="bg-white rounded-3xl shadow-xl p-8 text-center">
      <div id="datetime" class="text-lg font-medium text-gray-700 mb-6"></div>
      
      <div id="message" class="mb-8 text-sm font-medium"></div>

      <button onclick="collectBreakfast()" 
              id="collect-btn"
              class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-400 text-white font-semibold py-6 rounded-2xl text-2xl transition">
        Collect Today's Breakfast
      </button>
    </div>

    <div id="coupon-screen" class="hidden bg-white rounded-3xl shadow-2xl p-8 text-center">
      <div id="coupon" class="coupon rounded-3xl p-10 text-white"></div>
      <button onclick="resetApp()" 
              class="mt-10 bg-white text-emerald-700 hover:bg-emerald-100 font-semibold px-8 py-4 rounded-2xl shadow-lg transition">
        Done ✓
      </button>
    </div>

    <div id="already-screen" class="hidden bg-white rounded-3xl shadow-xl p-8 text-center">
      <div class="text-6xl mb-4">🙅‍♂️</div>
      <h2 class="text-2xl font-semibold text-gray-800">Already Collected Today</h2>
      <p class="text-gray-600 mt-3">You can collect breakfast again tomorrow.</p>
      <button onclick="resetApp()" class="mt-8 text-emerald-600 font-medium text-lg">Back</button>
    </div>
  </div>

  <script>
    // 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyDdxUmiVKz1HrWXskW50VdfAo-O8VvG63I",
  authDomain: "officebite-2026.firebaseapp.com",
  projectId: "officebite-2026",
  storageBucket: "officebite-2026.firebasestorage.app",
  messagingSenderId: "221687690326",
  appId: "1:221687690326:web:6e164899382ada305177f7",
  measurementId: "G-75LVRGSW2C"
};
    let app, auth, db;
    let currentUser = null;

    function getISTDateTime() {
      const now = new Date();
      const istOffset = 330;
      const localOffset = now.getTimezoneOffset();
      const istTime = new Date(now.getTime() + (istOffset + localOffset) * 60000);
      
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = istTime.toLocaleDateString('en-IN', options);
      const timeStr = istTime.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      
      return { 
        dateStr, 
        timeStr, 
        fullDate: istTime,
        hour: istTime.getHours(),
        today: istTime.toISOString().split('T')[0]
      };
    }

    function updateDateTime() {
      const { dateStr, timeStr, hour } = getISTDateTime();
      document.getElementById('datetime').innerHTML = `
        <div>${dateStr}</div>
        <div class="text-2xl font-semibold text-emerald-700">${timeStr} IST</div>
      `;

      const btn = document.getElementById('collect-btn');
      const msg = document.getElementById('message');

      if (hour >= 15) {
        btn.disabled = true;
        btn.textContent = "Collection Closed";
        msg.innerHTML = `<span class="text-red-600">Collection is closed after 3:00 PM IST</span>`;
      } else {
        btn.disabled = false;
        btn.textContent = "Collect Today's Breakfast";
        msg.innerHTML = `<span class="text-emerald-600">Collection open until 3:00 PM IST</span>`;
      }
    }

    async function initFirebase() {
      if (!firebaseConfig.apiKey) {
        alert("Firebase config is missing!");
        return;
      }
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      const userCred = await auth.signInAnonymously();
      currentUser = userCred.user;
    }

    async function collectBreakfast() {
      if (!currentUser) {
        alert("Please wait a moment...");
        return;
      }

      const { fullDate, hour, today } = getISTDateTime();

      if (hour >= 15) {
        alert("Breakfast collection is closed after 3:00 PM.");
        return;
      }

      try {
        const userRef = db.collection("users").doc(currentUser.uid);
        const doc = await userRef.get();

        if (doc.exists && doc.data().lastCollection === today) {
          document.getElementById('home-screen').classList.add('hidden');
          document.getElementById('already-screen').classList.remove('hidden');
          return;
        }

        await userRef.set({ lastCollection: today }, { merge: true });

        const countRef = db.collection("dailyCounts").doc(today);
        await countRef.set({ count: firebase.firestore.FieldValue.increment(1) }, { merge: true });

        showCoupon(today);
      } catch (e) {
        console.error(e);
        alert("Error collecting breakfast. Please try again.");
      }
    }

    function showCoupon(today) {
      document.getElementById('home-screen').classList.add('hidden');
      
      const couponHTML = `
        <div class="text-center">
          <div class="flex justify-center mb-4">
            <div class="bg-white/20 backdrop-blur-md text-white text-xs font-bold px-6 py-1.5 rounded-full border border-white/30">
              OFFICIAL COUPON
            </div>
          </div>
          
          <div class="text-7xl mb-4">🍱</div>
          
          <h2 class="text-4xl font-bold tracking-tight">Breakfast Collected</h2>
          
          <div class="my-8 border-t border-white/30 pt-8">
            <p class="text-emerald-100 text-lg">Date</p>
            <p class="text-3xl font-semibold tracking-wider">${today}</p>
          </div>

          <div class="bg-white/20 backdrop-blur-md rounded-2xl py-6 px-10 mb-8">
            <p class="text-2xl font-bold">✅ SUCCESSFULLY REDEEMED</p>
          </div>

          <div class="text-xs text-emerald-100/80 tracking-widest">
            VALID FOR TODAY ONLY • SHOW TO VENDOR
          </div>
        </div>`;

      document.getElementById('coupon').innerHTML = couponHTML;
      document.getElementById('coupon-screen').classList.remove('hidden');
    }

    function resetApp() {
      location.reload();
    }

    window.onload = () => {
      updateDateTime();
      setInterval(updateDateTime, 30000);
      initFirebase();
    };
  </script>
</body>
</html>
